<section class="alumni-section">

  <div class="section-title">

    <h2>Our Proud Alumni</h2>

    <p>
      Meet our successful alumni who are excelling in various industries
      and making our institution proud.
    </p>

  </div>

  <div class="alumni-grid">

    <div
      class="alumni-card"
      *ngFor="let alumni of visibleAlumni">

      <div class="image-box">
        <img [src]="alumni.image" alt="">
      </div>

      <div class="card-content">

        <h3>{{ alumni.name }}</h3>

        <p class="role">{{ alumni.role }}</p>

        <p class="company">{{ alumni.company }}</p>

      </div>

    </div>

  </div>

  <!-- SEE MORE BUTTON -->

  <div
    class="btn-wrapper"
    *ngIf="visibleCount < alumniList.length">

    <button
      class="see-more-btn"
      (click)="showMore()">

      See More

    </button>

  </div>

</section>
